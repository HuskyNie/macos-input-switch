name: InputSwitch
options:
  minimumXcodeGenVersion: 2.42.0
settings:
  base:
    SWIFT_VERSION: 6.0
targets:
  InputSwitch:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: InputSwitch
    info:
      path: InputSwitch/Info.plist
      properties:
        LSUIElement: true
        NSAppleEventsUsageDescription: "InputSwitch inspects the active app and switches input sources automatically."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.husky.InputSwitch
        CODE_SIGN_STYLE: Automatic
    dependencies: []
  InputSwitchTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: InputSwitchTests
    dependencies:
      - target: InputSwitch
